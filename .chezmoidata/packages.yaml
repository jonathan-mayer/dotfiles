# These dont currently get applied automatically, this currently is just a place to keep track of installed packages

sources:
  brew:
    command: "brew install $name"
    condition: "command -v brew" # will be evaluated as [[ {{ .condition }} ]]
    priority: 5 # prefer brew
  pacman:
    command: "sudo pacman -S $name"
    condition: "command -v pacman"
    priority: 10
  apt:
    command: "sudo apt install $name"
    condition: "command -v apt"
    priority: 10
  dnf:
    command: "sudo dnf install $name"
    condition: "command -v dnf"
    priority: 15
  yay:
    command: "yay -S $name"
    condition: "command -v yay"
    priority: 15

